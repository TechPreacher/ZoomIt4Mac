name: ZoomIt4Mac
options:
  bundleIdPrefix: com.corti
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    # Stable signing identity so TCC permissions survive rebuilds
    # (ad-hoc signatures change every build and reset Screen Recording consent).
    DEVELOPMENT_TEAM: M9Y77E7ZX5
targets:
  ZoomItCore:
    type: framework
    platform: macOS
    sources: [ZoomItCore/Sources]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ZoomItCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: [ZoomItCore/Tests]
    dependencies:
      - target: ZoomItCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  ZoomIt4Mac:
    type: application
    platform: macOS
    sources:
      - ZoomIt4Mac/Sources
      - path: ZoomIt4Mac/Resources
        buildPhase: resources
    dependencies:
      - target: ZoomItCore
        embed: true
    info:
      path: ZoomIt4Mac/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: ZoomIt4Mac
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
        NSMicrophoneUsageDescription: ZoomIt4Mac records microphone audio in screen recordings when enabled in Settings.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    entitlements:
      path: ZoomIt4Mac/ZoomIt4Mac.entitlements
      properties:
        # Hardened runtime auto-denies microphone access (no prompt, no TCC
        # entry) without this entitlement.
        com.apple.security.device.audio-input: true
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
schemes:
  ZoomIt4Mac:
    build:
      targets:
        ZoomIt4Mac: all
    test:
      targets: [ZoomItCoreTests]
