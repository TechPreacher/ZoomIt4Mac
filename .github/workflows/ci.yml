name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen

      - name: Build
        run: |
          xcodebuild -project ZoomIt4Mac.xcodeproj -scheme ZoomIt4Mac \
            build CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild -project ZoomIt4Mac.xcodeproj -scheme ZoomIt4Mac \
            test -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO
